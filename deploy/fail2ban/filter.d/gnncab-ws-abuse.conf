# =============================================================================
# fail2ban filter: gnncab-ws-abuse
# Matches repeated WebSocket upgrade requests (potential WS connection flooding)
# =============================================================================
[INCLUDES]
before = common.conf

[Definition]
# WebSocket upgrade requests to /ws endpoint
failregex = ^<HOST> - \S+ \[.*\] "GET /ws\S* HTTP/[\d.]+" (?:101|400|429) \d+
ignoreregex =
