# =============================================================================
# fail2ban filter: gnncab-auth
# Matches HTTP 401 responses on GNNcab API auth endpoints in Nginx access log
# Log format: combined (default Nginx)
#   $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent
# =============================================================================
[INCLUDES]
before = common.conf

[Definition]
# Match POST to /api/auth/login or /api/auth/register returning 401
failregex = ^<HOST> - \S+ \[.*\] "(?:POST|GET) /api/auth/(?:login|register)\S* HTTP/[\d.]+" 401 \d+
ignoreregex =
